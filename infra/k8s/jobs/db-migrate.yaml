apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: ozpropertyreport
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: regcred
      containers:
        - name: db-migrate
          image: ${REGISTRY}/ozpr-db-migrate:${IMAGE_TAG}
          # Uses psycopg2 (sync) — alembic does not support asyncpg
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ozpr-secrets
                  key: DATABASE_URL_SYNC
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
