apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-web
  namespace: ozpropertyreport
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-web
  template:
    metadata:
      labels:
        app: admin-web
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: admin-web
          image: ${REGISTRY}/ozpr-admin-web:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: ADMIN_BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: ozpr-config
                  key: ADMIN_BACKEND_URL
            # Map admin Clerk keys → app-expected env var names
            # (envFrom loads all secrets, but these explicit entries take precedence)
            - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: ozpr-secrets
                  key: CLERK_ADMIN_PUBLISHABLE_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ozpr-secrets
                  key: CLERK_ADMIN_SECRET_KEY
          envFrom:
            - secretRef:
                name: ozpr-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-web
  namespace: ozpropertyreport
spec:
  type: ClusterIP
  selector:
    app: admin-web
  ports:
    - port: 3001
      targetPort: 3001
