apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-backend
  namespace: ozpropertyreport
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-backend
  template:
    metadata:
      labels:
        app: admin-backend
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: admin-backend
          image: ${REGISTRY}/ozpr-admin-backend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - secretRef:
                name: ozpr-secrets
            - configMapRef:
                name: ozpr-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "384Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-backend
  namespace: ozpropertyreport
spec:
  type: ClusterIP
  selector:
    app: admin-backend
  ports:
    - port: 8082
      targetPort: 8082
