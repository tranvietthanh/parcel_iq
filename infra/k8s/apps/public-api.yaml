apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
  namespace: ozpropertyreport
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public-api
  template:
    metadata:
      labels:
        app: public-api
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: public-api
          image: ${REGISTRY}/ozpr-public-api:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: ozpr-secrets
            - configMapRef:
                name: ozpr-config
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: public-api
  namespace: ozpropertyreport
spec:
  type: ClusterIP
  selector:
    app: public-api
  ports:
    - port: 8080
      targetPort: 8080
