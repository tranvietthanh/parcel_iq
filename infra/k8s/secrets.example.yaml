# =============================================================================
# infra/k8s/secrets.example.yaml
#
# REFERENCE ONLY — do NOT commit real values.
# This file documents every key required in the `ozpr-secrets` K8s Secret.
#
# To apply real secrets to the cluster, run:
#   make k8s-secrets
# which reads your local .env file and pipes it directly to kubectl
# (the generated YAML is never written to disk).
#
# First-time setup:
#   1. Copy all service .env.example files to .env and fill in real values
#   2. Merge them into a single root .env (or use the env layout your team prefers)
#   3. Run: make k8s-secrets
#   4. Verify: kubectl get secret ozpr-secrets -n ozpropertyreport
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ozpr-secrets
  namespace: ozpropertyreport
type: Opaque
stringData:
  # ── Database ───────────────────────────────────────────────────────────────
  POSTGRES_USER: <PLACEHOLDER>
  POSTGRES_PASSWORD: <PLACEHOLDER>
  POSTGRES_DB: <PLACEHOLDER>

  # asyncpg URL (FastAPI services)
  DATABASE_URL: postgresql+asyncpg://<PLACEHOLDER>:<PLACEHOLDER>@postgres:5432/<PLACEHOLDER>

  # psycopg2 URL (Celery workers — sync driver)
  DATABASE_URL_SYNC: postgresql+psycopg2://<PLACEHOLDER>:<PLACEHOLDER>@postgres:5432/<PLACEHOLDER>

  # ── Redis ──────────────────────────────────────────────────────────────────
  # (also in ConfigMap as REDIS_URL for non-sensitive form)

  # ── MinIO ──────────────────────────────────────────────────────────────────
  MINIO_ACCESS_KEY: <PLACEHOLDER>
  MINIO_SECRET_KEY: <PLACEHOLDER>
  REPORT_PDF_BUCKET: property-report-pdfs

  # ── Clerk — Public Instance (public-web + public-api) ─────────────────────
  # Stored under distinct key names to avoid collision (public-web and admin-web
  # both need NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY but with different values).
  # The Deployments map these to the app-expected env var names via explicit env entries.
  CLERK_PUBLIC_PUBLISHABLE_KEY: <PLACEHOLDER>
  CLERK_PUBLIC_SECRET_KEY: <PLACEHOLDER>
  CLERK_PUBLIC_JWKS_URL: <PLACEHOLDER>

  # ── Clerk — Admin Instance (admin-web + admin-backend) ────────────────────
  CLERK_ADMIN_PUBLISHABLE_KEY: <PLACEHOLDER>
  CLERK_ADMIN_SECRET_KEY: <PLACEHOLDER>
  CLERK_ADMIN_ORG_ID: <PLACEHOLDER>

  # ── Internal service token (admin-web ↔ admin-backend) ────────────────────
  ADMIN_SERVICE_TOKEN: <PLACEHOLDER>

  # ── Internal webhook secret (public-web → public-api) ─────────────────────
  INTERNAL_WEBHOOK_SECRET: <PLACEHOLDER>

  # ── Property image enrichment (admin-backend + pdf-renderer) ──────────────
  GOOGLE_MAPS_API_KEY: <PLACEHOLDER>

  # ── Cloudflare Turnstile ───────────────────────────────────────────────────
  TURNSTILE_SECRET_KEY: <PLACEHOLDER>

  # ── Stripe ─────────────────────────────────────────────────────────────────
  STRIPE_SECRET_KEY: <PLACEHOLDER>
  STRIPE_WEBHOOK_SECRET: <PLACEHOLDER>

  # ── Email (Resend) ─────────────────────────────────────────────────────────
  RESEND_API_KEY: <PLACEHOLDER>

  # ── OpenAI (llm-parser-worker) ─────────────────────────────────────────────
  OPENAI_API_KEY: <PLACEHOLDER>
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_MODEL: gpt-4o-mini
  OPENAI_DAILY_QUOTA: "100000"
  OPENAI_MAX_RPM: "60"

  # ── Residential proxy (scraper-worker) ────────────────────────────────────
  PROXY_URL: <PLACEHOLDER>
  PROXY_USERNAME: <PLACEHOLDER>
  PROXY_PASSWORD: <PLACEHOLDER>
