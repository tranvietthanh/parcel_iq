apiVersion: v1
kind: ConfigMap
metadata:
  name: ozpr-config
  namespace: ozpropertyreport
data:
  # ── Environment ───────────────────────────────────────────────────────────
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  # ── Internal service hostnames (K8s DNS) ──────────────────────────────────
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "parceliq"

  REDIS_URL: "redis://redis:6379/0"

  MINIO_ENDPOINT: "minio:9000"
  MINIO_USE_SSL: "false"

  FLOWER_INTERNAL_URL: "http://flower:5555"

  # ── Internal service URLs ─────────────────────────────────────────────────
  INTERNAL_API_URL: "http://public-api:8080"
  ADMIN_BACKEND_URL: "http://admin-backend:8082"

  # ── App ports ─────────────────────────────────────────────────────────────
  PUBLIC_WEB_PORT: "3000"
  ADMIN_WEB_PORT: "3001"
  PUBLIC_API_PORT: "8080"
  ADMIN_BACKEND_PORT: "8082"

  # ── Feature flags ─────────────────────────────────────────────────────────
  PROPERTY_IMAGE_ENRICHMENT_ENABLED: "false"
  CREDIT_PURCHASE_ENABLED: "false"
