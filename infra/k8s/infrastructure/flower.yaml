apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: ozpropertyreport
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      enableServiceLinks: false
      containers:
        - name: flower
          image: mher/flower:2.0
          ports:
            - containerPort: 5555
          env:
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: ozpr-config
                  key: REDIS_URL
          resources:
            requests:
              cpu: "25m"
              memory: "48Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5555
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 5555
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: ozpropertyreport
spec:
  type: ClusterIP
  selector:
    app: flower
  ports:
    - port: 5555
      targetPort: 5555
